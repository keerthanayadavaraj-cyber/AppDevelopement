<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<>, initial-scale=1.0">
    <title>Document</title>
    <style>
        .body{
            background-color:red;
            margin: 0%;
            font-family: Arial,  sans-serif;


        }
        .parent{
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
            gap:30px;
            padding: 30px;


        }
        .product{
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(red, green, blue, alpha);
            text-align: center;
            padding-bottom: 15px;
            transition: transform 0.3s;
            border:1px solid black;
            overflow: hidden;
        }
        .product img{
            object-fit: cover;
            height: 200px;
            width: 100%;
        }
        .product h2{
            margin: 10px 0 5px;
        }

        .product p{
            font-size: 18px;
            font-weight: bold;
            color:green;
        }
        .product button{
            background: black;
            color: white;
            border:none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        
    </style>
</head>
<body>
    <div class="parent">
        <div class="product">
            <img src="https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8d2F0Y2h8ZW58MHx8MHx8fDA%3D">
            <h2>Watch</h2>
            <p>Price-8000</p>
            <button>Add to cart</button>
        </div>    
            <div class="product">
                <img src="https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bmlrZSUyMHNob2VzfGVufDB8fDB8fHww">
                <h2>Nike Shoes</h2>
                <p>price 12000</p>
                <button>Add to cart</button>
            </div>    
                

            <div class="product">
                <img src="https://images.unsplash.com/photo-1626895872564-b691b6877b83?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bGlwc3RpY2tzfGVufDB8fDB8fHww">
                <h2>Serum</h2>
                <p>price-1000</p>
                <button>Add to cart</button>
            </div>
        

            <div class="product">
                <img src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y29zbWV0aWN8ZW58MHx8MHx8fDA%3D">
                <h2>Make-Up Brush</h2>
                <p>price-450</p>
                <button>Add to cart</button>
            </div>

             <div class="product">
                <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Perfume</h2>
                <p>Price-1500</p>
                <button>Add to cart</button>
             </div>
             <div class="product">
                <img src="https://plus.unsplash.com/premium_photo-1675186049366-64a655f8f537?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Pink Coat</h2>
                <p>price-3000</p>
                <button>Add to cart</button>
            </div>
        </div>
    </div>
</body>
</html>
