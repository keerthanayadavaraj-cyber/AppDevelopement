<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .products{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap: 10px;
        }
        .box{
            background-color: bisque;
             padding: 10px; 
            text-align: center;
            border: 1px solid black;
            font-weight: bold;

        }
    </style>
</head>
<body>
    <div class="products">
        <div class="box">cake</div>
        <div class="box">pastry</div>
        <div class="box">Cookie</div>
        <div class="box">Price</div>
        <div class="box">icecreame</div>
        <div class="box">Egg puffs</div>
    </div>
</body>
</html>
